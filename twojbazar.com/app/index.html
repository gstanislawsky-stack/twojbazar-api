<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="TwojBazar - mobilna wersja portalu ogłoszeń dla Polaków w Szwecji, Norwegii i Danii.">
  <title>TwojBazar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-body">
  <div class="app-background" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="app-topbar">
      <button class="topbar-icon hidden" id="backButton" type="button" aria-label="Wr&oacute;&#263;">
        <span aria-hidden="true">&#8592;</span>
      </button>
      <div class="topbar-brand">
        <div class="brand-mark" aria-hidden="true">TB</div>
        <div class="topbar-copy">
          <h1 class="topbar-title" id="topbarTitle">TwojBazar</h1>
        </div>
      </div>
      <button class="topbar-action" id="topbarAction" type="button" aria-label="Przejd&#378; do dodawania og&#322;oszenia">
        Dodaj
      </button>
    </header>

    <main class="app-main" id="appMain" aria-live="polite"></main>

    <nav class="app-bottom-nav" aria-label="Nawigacja g&#322;&oacute;wna">
      <a class="bottom-nav-link active" data-route="home" href="#home">
        <span>Start</span>
      </a>
      <a class="bottom-nav-link" data-route="add" href="#add">
        <span>Dodaj</span>
      </a>
      <a class="bottom-nav-link" data-route="account" href="#account">
        <span>Konto</span>
      </a>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
